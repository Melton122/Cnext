name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cnext-linux-x64
          - os: macos-latest
            artifact: cnext-macos-x64
          - os: macos-latest
            artifact: cnext-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y gcc make libcurl4-openssl-dev

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install make curl

    - name: Build
      run: make

    - name: Package
      run: |
        mkdir -p dist
        cp cnext dist/
        cp -r include dist/ 2>/dev/null || true
        cp -r examples dist/ 2>/dev/null || true
        cp -r docs dist/ 2>/dev/null || true
        cp README.md dist/ 2>/dev/null || true
        cp LICENSE dist/ 2>/dev/null || true
        cp install.sh dist/ 2>/dev/null || true
        chmod +x dist/install.sh 2>/dev/null || true

    - name: Create Archive
      run: |
        cd dist
        tar -czf ../${{ matrix.artifact }}-${{ github.ref_name }}.tar.gz *

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}-*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v4

    - name: Generate Checksums
      run: |
        find cnext-* -type f -name "*.tar.gz" -exec sha256sum {} \; > checksums.txt
        cat checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          cnext-linux-x64/*.tar.gz
          cnext-macos-x64/*.tar.gz
          cnext-macos-arm64/*.tar.gz
          checksums.txt

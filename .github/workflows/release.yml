name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cnext-linux-x64
            ext: tar.gz
          - os: macos-latest
            artifact: cnext-macos-x64
            ext: tar.gz
          - os: macos-latest
            artifact: cnext-macos-arm64
            ext: tar.gz
          - os: windows-latest
            artifact: cnext-windows-x64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y gcc make libcurl4-openssl-dev

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install make curl

    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MSYS
        install: >-
          gcc
          make
          zip

    - name: Build (Unix)
      if: runner.os != 'Windows'
      run: make

    - name: Build (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: make -j4

    - name: Package & Archive (Unix)
      if: runner.os != 'Windows'
      run: |
        mkdir -p dist
        cp cnext dist/
        cp -r include dist/ 2>/dev/null || true
        cp -r examples dist/ 2>/dev/null || true
        cp -r docs dist/ 2>/dev/null || true
        cp README.md dist/ 2>/dev/null || true
        cp LICENSE dist/ 2>/dev/null || true
        cp install.sh dist/ 2>/dev/null || true
        chmod +x dist/install.sh 2>/dev/null || true
        cd dist
        tar -czf ../${{ matrix.artifact }}-${{ github.ref_name }}.${{ matrix.ext }} *

    - name: Package & Archive (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        mkdir -p dist
        cp cnext.exe dist/
        cp -r include dist/ 2>/dev/null || true
        cp -r examples dist/ 2>/dev/null || true
        cp -r docs dist/ 2>/dev/null || true
        cp README.md dist/ 2>/dev/null || true
        cp LICENSE dist/ 2>/dev/null || true
        cd dist
        zip -r ../${{ matrix.artifact }}-${{ github.ref_name }}.${{ matrix.ext }} *

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}-*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v4

    - name: Generate Checksums
      run: |
        find cnext-* -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > checksums.txt
        cat checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          cnext-linux-x64/*.tar.gz
          cnext-macos-x64/*.tar.gz
          cnext-macos-arm64/*.tar.gz
          cnext-windows-x64/*.zip
          checksums.txt
